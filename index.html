<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 NoteVault - 你的第二大脑</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Search */
        .search-section {
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab:hover, .tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Notes Grid */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .note-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .note-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .note-card h3 {
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .note-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .note-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .note-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .note-tags {
            display: flex;
            gap: 6px;
        }

        .tag {
            padding: 4px 10px;
            background: var(--bg);
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Add Note Button */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            font-size: 2rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fab:hover {
            transform: scale(1.1);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 16px;
            max-width: 700px;
            width: 100%;
            padding: 30px;
            margin-top: 40px;
            border: 1px solid var(--border);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 1.3rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
        }

        .form-group textarea {
            min-height: 200px;
            resize: vertical;
            font-family: inherit;
            line-height: 1.6;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .empty-state h3 {
            margin-bottom: 10px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            display: none;
            z-index: 1001;
        }

        .toast.show { display: block; }

        /* Note View Modal */
        .note-view {
            max-height: 60vh;
            overflow-y: auto;
            margin-bottom: 20px;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        /* AI Summary */
        .ai-summary {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .ai-summary h4 {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .ai-summary p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 NoteVault</h1>
            <span class="stats" id="stats">共 0 条笔记</span>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索笔记...">
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" data-filter="all">全部</button>
            <button class="tab" data-filter="learn">📚 学习</button>
            <button class="tab" data-filter="work">💼 工作</button>
            <button class="tab" data-filter="life">🏠 生活</button>
            <button class="tab" data-filter="idea">💡 想法</button>
        </div>

        <div class="notes-grid" id="notesGrid">
            <div class="empty-state">
                <h3>还没有笔记</h3>
                <p>点击右下角 + 按钮创建第一篇笔记</p>
            </div>
        </div>
    </div>

    <button class="fab" onclick="openAddModal()">+</button>

    <!-- Add/Edit Modal -->
    <div class="modal" id="noteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新建笔记</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="form-group">
                <label>标题</label>
                <input type="text" id="noteTitle" placeholder="输入笔记标题...">
            </div>
            <div class="form-group">
                <label>分类</label>
                <select id="noteCategory">
                    <option value="learn">📚 学习</option>
                    <option value="work">💼 工作</option>
                    <option value="life">🏠 生活</option>
                    <option value="idea">💡 想法</option>
                </select>
            </div>
            <div class="form-group">
                <label>内容</label>
                <textarea id="noteContent" placeholder="在这里写下你的笔记..."></textarea>
            </div>
            <div class="actions">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveNote()">保存</button>
            </div>
        </div>
    </div>

    <!-- View Modal -->
    <div class="modal" id="viewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="viewTitle">笔记标题</h2>
                <button class="close-btn" onclick="closeViewModal()">×</button>
            </div>
            <div id="viewCategory" style="color: var(--text-muted); margin-bottom: 15px;"></div>
            <div class="ai-summary" id="aiSummary" style="display: none;">
                <h4>🧠 AI 摘要</h4>
                <p id="aiSummaryText"></p>
            </div>
            <div class="note-view" id="viewContent"></div>
            <div class="actions">
                <button class="btn btn-danger" onclick="deleteNote()">删除</button>
                <button class="btn btn-secondary" onclick="closeViewModal()">关闭</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">已保存！</div>

    <script>
        // Data
        let notes = JSON.parse(localStorage.getItem('noteVaultNotes') || '[]');
        let currentFilter = 'all';
        let currentNoteId = null;

        const categoryEmojis = {
            learn: '📚',
            work: '💼',
            life: '🏠',
            idea: '💡'
        };

        const categoryNames = {
            learn: '学习',
            work: '工作',
            life: '生活',
            idea: '想法'
        };

        // Render
        function renderNotes() {
            const grid = document.getElementById('notesGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = notes;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(n => n.category === currentFilter);
            }
            
            if (search) {
                filtered = filtered.filter(n => 
                    n.title.toLowerCase().includes(search) || 
                    n.content.toLowerCase().includes(search)
                );
            }

            filtered.sort((a, b) => b.updatedAt - a.updatedAt);

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h3>${notes.length === 0 ? '还没有笔记' : '没有找到匹配的笔记'}</h3>
                        <p>${notes.length === 0 ? '点击右下角 + 按钮创建第一篇笔记' : '试试其他关键词'}</p>
                    </div>
                `;
            } else {
                grid.innerHTML = filtered.map(note => `
                    <div class="note-card" onclick="viewNote(${note.id})">
                        <h3>${categoryEmojis[note.category]} ${note.title}</h3>
                        <p>${note.content}</p>
                        <div class="note-meta">
                            <span class="note-date">${formatDate(note.updatedAt)}</span>
                            <div class="note-tags">
                                <span class="tag">${categoryNames[note.category]}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            document.getElementById('stats').textContent = `共 ${notes.length} 条笔记`;
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff/60000)} 分钟前`;
            if (diff < 86400000) return `${Math.floor(diff/3600000)} 小时前`;
            if (diff < 604800000) return `${Math.floor(diff/86400000)} 天前`;
            
            return date.toLocaleDateString('zh-CN');
        }

        // Modal functions
        function openAddModal() {
            document.getElementById('modalTitle').textContent = '新建笔记';
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            document.getElementById('noteCategory').value = 'learn';
            currentNoteId = null;
            document.getElementById('noteModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('noteModal').classList.remove('active');
        }

        function saveNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();
            const category = document.getElementById('noteCategory').value;

            if (!title || !content) {
                alert('请填写标题和内容');
                return;
            }

            const now = Date.now();

            if (currentNoteId) {
                // Update existing
                const index = notes.findIndex(n => n.id === currentNoteId);
                if (index !== -1) {
                    notes[index] = {
                        ...notes[index],
                        title,
                        content,
                        category,
                        updatedAt: now
                    };
                }
            } else {
                // Create new
                notes.push({
                    id: now,
                    title,
                    content,
                    category,
                    createdAt: now,
                    updatedAt: now
                });
            }

            localStorage.setItem('noteVaultNotes', JSON.stringify(notes));
            closeModal();
            renderNotes();
            showToast('已保存！');
        }

        function viewNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;

            currentNoteId = id;
            document.getElementById('viewTitle').textContent = `${categoryEmojis[note.category]} ${note.title}`;
            document.getElementById('viewCategory').textContent = categoryNames[note.category];
            document.getElementById('viewContent').textContent = note.content;
            document.getElementById('viewModal').classList.add('active');

            // Generate AI summary
            const summary = generateAISummary(note.content);
            const summaryDiv = document.getElementById('aiSummary');
            if (summary) {
                document.getElementById('aiSummaryText').textContent = summary;
                summaryDiv.style.display = 'block';
            } else {
                summaryDiv.style.display = 'none';
            }
        }

        function closeViewModal() {
            document.getElementById('viewModal').classList.remove('active');
            currentNoteId = null;
        }

        function deleteNote() {
            if (!currentNoteId) return;
            
            if (confirm('确定要删除这条笔记吗？')) {
                notes = notes.filter(n => n.id !== currentNoteId);
                localStorage.setItem('noteVaultNotes', JSON.stringify(notes));
                closeViewModal();
                renderNotes();
                showToast('已删除');
            }
        }

        // Simple local AI summary (rule-based)
        function generateAISummary(content) {
            if (content.length < 50) return null;
            
            // Extract key sentences
            const sentences = content.split(/[。！？\n]/).filter(s => s.trim().length > 10);
            if (sentences.length === 0) return null;
            
            // Take first 2-3 sentences as "summary"
            const summary = sentences.slice(0, 3).join('。');
            return summary.length > 200 ? summary.slice(0, 200) + '...' : summary + '。';
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', renderNotes);

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderNotes();
            });
        });

        document.getElementById('noteModal').addEventListener('click', (e) => {
            if (e.target.id === 'noteModal') closeModal();
        });

        document.getElementById('viewModal').addEventListener('click', (e) => {
            if (e.target.id === 'viewModal') closeViewModal();
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Initialize
        renderNotes();
    </script>
</body>
</html>
